<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ProjectPQ Study Room</title>
<style>
  body {
    font-family: sans-serif;
    background: #111;
    color: #eee;
    text-align: center;
    padding: 20px;
    margin: 0;
  }
  #join-screen { margin-top: 40px; }
  input, button {
    padding: 8px 12px;
    font-size: 16px;
    margin: 5px;
  }

  /* Video grid — this is what handles 3 to 30 participants
     without a hand-built layout. It just wraps as needed. */
  #video-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    padding: 10px;
  }

  /* The shared screen gets its own large area above the camera
     grid, since that's what people expect when someone presents. */
  #screen-share-container {
    display: none;
    max-width: 900px;
    margin: 0 auto 15px auto;
    background: #000;
    border-radius: 8px;
    overflow: hidden;
  }
  #screen-share-container video {
    width: 100%;
    display: block;
  }
  #screen-share-label {
    background: #222;
    padding: 4px 10px;
    font-size: 13px;
    text-align: left;
  }
  .participant-tile {
    position: relative;
    width: 220px;
    background: #000;
    border-radius: 8px;
    overflow: hidden;
    border: 2px solid transparent;
  }
  /* Highlight whoever is currently speaking — important at
     30-person scale so people can tell who's talking. */
  .participant-tile.speaking {
    border-color: #4ade80;
  }
  .participant-tile video {
    width: 100%;
    display: block;
  }
  .participant-name {
    position: absolute;
    bottom: 4px;
    left: 6px;
    background: rgba(0,0,0,0.6);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 12px;
  }

  #controls {
    margin-top: 15px;
    position: sticky;
    bottom: 0;
    background: #111;
    padding: 10px;
  }

  #chat-panel {
    max-width: 400px;
    margin: 20px auto;
    text-align: left;
    background: #222;
    padding: 10px;
    border-radius: 8px;
  }
  #chat-log {
    height: 150px;
    overflow-y: auto;
    margin-bottom: 8px;
  }
</style>
</head>
<body>

  <h2>ProjectPQ Study Room</h2>

  <!-- Step 1: enter room name + your name. In production, name
       comes from your logged-in student session, not a text box. -->
  <div id="join-screen">
    <input id="room-input" placeholder="Room name (e.g. gse101-study)" />
    <input id="name-input" placeholder="Your name" />
    <button id="join-btn">Join Room</button>
  </div>

  <div id="room-screen" style="display:none;">
    <!-- Shown only while someone is sharing their screen -->
    <div id="screen-share-container">
      <div id="screen-share-label"></div>
    </div>

    <div id="video-grid"></div>

    <div id="controls">
      <button id="mute-btn">Mute</button>
      <button id="camera-btn">Camera Off</button>
      <button id="screen-share-btn">Share Screen</button>
      <button id="leave-btn">Leave Room</button>
    </div>

    <div id="chat-panel">
      <div id="chat-log"></div>
      <input id="chat-input" placeholder="Type a message..." />
      <button id="chat-send-btn">Send</button>
    </div>
  </div>

  <!-- LiveKit's client SDK, loaded as an ES module from a CDN.
       For production you'd typically install it via npm and bundle
       it with your frontend build tool instead, but a CDN import
       keeps this demo dependency-free on the frontend. -->
  <script type="module" src="/client.js"></script>
</body>
</html>
